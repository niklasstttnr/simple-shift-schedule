# Load DB credentials from .env (copy .env.example to .env).
# Defaults below are used if .env is missing.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./graphql-be
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
    ports:
      - "4000:4000"
    command: ["node", "dist/index.js"]

  frontend:
    build:
      context: ./react-fe
      dockerfile: Dockerfile
      args:
        VITE_GRAPHQL_URI: http://localhost:4000/graphql
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
    name: base_graphql_postgres_data
