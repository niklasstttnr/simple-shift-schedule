version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Override DATABASE_URL so the container uses the postgres service host, not localhost
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
    ports:
      - '${PORT-4000}:4000'
    command: ['node', 'dist/index.js']

volumes:
  postgres_data:
    name: base_graphql_postgres_data
